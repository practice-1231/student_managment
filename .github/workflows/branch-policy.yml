name: branch policy
on:
  pull_request:
    branches: [main, staging]

jobs:
  source-branch:
    runs-on: ubuntu-latest
    steps:
      - run: |
          BASE="${{ github.base_ref }}"
          HEAD="${{ github.head_ref }}"
          if [ "$BASE" = "main" ] && [ "$HEAD" != "staging" ]; then
            echo "main only accepts PRs from staging (got $HEAD)"; exit 1
          fi
          if [ "$BASE" = "staging" ] && [ "$HEAD" != "dev" ]; then
            echo "staging only accepts PRs from dev (got $HEAD)"; exit 1
          fi
